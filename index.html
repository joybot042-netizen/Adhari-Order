<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Adhari Orders"/>
<meta name="theme-color" content="#0d1b4b"/>
<title>Adhari Pharmaceuticals</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans','Segoe UI',sans-serif;background:#f0f4ff;min-height:100vh}
input,select,textarea,button{font-family:inherit}
.hdr{background:linear-gradient(135deg,#0d1b4b,#1a3a8f,#2563eb);padding:12px 16px;position:sticky;top:0;z-index:100;box-shadow:0 3px 16px rgba(13,27,75,0.3)}
.hdr-in{max-width:980px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.logo-w{display:flex;align-items:center;gap:10px}
.logo-w img{height:44px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3))}
.co-n{color:#fff;font-weight:800;font-size:14px}
.co-s{color:#93c5fd;font-size:10px;margin-top:1px}
.co-s2{color:#bfdbfe;font-size:9.5px;margin-top:1px}
.nav{display:flex;gap:6px;background:rgba(0,0,0,0.2);border-radius:10px;padding:5px 6px}
.nb{border:2px solid rgba(255,255,255,0.6);background:rgba(255,255,255,0.15);color:#fff;border-radius:8px;padding:6px 12px;cursor:pointer;font-weight:700;font-size:12px}
.nb.on{background:#fff;color:#0d1b4b;border-color:#fff}
.tgl{background:#dbeafe;border-bottom:1px solid #bfdbfe;padding:5px;text-align:center;font-size:11px;font-weight:700;color:#1e40af;letter-spacing:1px}
.main{max-width:980px;margin:0 auto;padding:18px 12px}
.card{background:#fff;border-radius:14px;border:1.5px solid #dbeafe;padding:14px 18px;box-shadow:0 2px 8px rgba(26,58,143,0.07);margin-bottom:10px;cursor:pointer}
.box{background:#fff;border-radius:18px;border:1.5px solid #dbeafe;padding:22px;box-shadow:0 4px 20px rgba(26,58,143,0.1)}
.sec{background:#f8faff;border-radius:12px;padding:14px 16px;margin-bottom:14px;border:1px solid #dbeafe}
.sec2{background:#f0f7ff;border-radius:12px;padding:14px 16px;margin-bottom:14px;border:1px solid #bfdbfe}
.sec3{background:#f0fff4;border-radius:12px;padding:14px 16px;margin-bottom:14px;border:1px solid #bbf7d0}
.stl{font-weight:800;color:#0d1b4b;font-size:11px;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.inp{width:100%;padding:9px 12px;border-radius:8px;border:1.5px solid #bfdbfe;font-size:14px;outline:none;background:#fff;font-family:inherit}
.inp:focus{border-color:#1a3a8f}
.lbl{font-size:11px;color:#1e40af;font-weight:700;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.th{background:#0d1b4b;color:#fff;padding:9px 16px;font-weight:800;font-size:12px}
.tw{border-radius:12px;overflow:hidden;border:1.5px solid #bfdbfe;margin-bottom:14px}
table{width:100%;border-collapse:collapse}
thead tr{background:#eff6ff}
thead th{padding:7px 10px;font-size:11px;font-weight:800;color:#1e40af;text-align:left}
tbody tr:nth-child(even){background:#f8faff}
tbody td{padding:7px 10px;font-size:12px;border-bottom:1px solid #dbeafe}
.bp{background:#0d1b4b;color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:800;cursor:pointer;width:100%}
.bp:disabled{opacity:.5;cursor:not-allowed}
.bs{padding:12px 20px;background:transparent;color:#888;border:1.5px solid #ddd;border-radius:10px;font-size:14px;cursor:pointer}
.bd{background:#fce4ec;color:#c62828;border:1px solid #ef9a9a;border-radius:7px;padding:5px 12px;font-size:12px;cursor:pointer;font-weight:700}
.qi{width:54px;padding:4px 6px;border-radius:6px;border:1.5px solid #93c5fd;font-size:13px;font-weight:700;text-align:center;outline:none;background:#eff6ff}
.mi{width:70px;padding:4px 6px;border-radius:6px;border:1.5px solid #bfdbfe;font-size:12px;text-align:right;outline:none}
.bi{width:58px;padding:4px 6px;border-radius:6px;border:1.5px solid #bfdbfe;font-size:12px;outline:none}
.empty{text-align:center;padding:50px 0;color:#aaa}
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:1000;display:flex;align-items:center;justify-content:center;padding:12px}
.mod{background:#fff;border-radius:18px;width:100%;max-width:720px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.mhd{background:linear-gradient(90deg,#0d1b4b,#1a3a8f);padding:16px 20px;border-radius:18px 18px 0 0;display:flex;justify-content:space-between;align-items:center}
.mbd{padding:20px}
.tr{display:flex;justify-content:space-between;padding:4px 0;font-size:13px}
.tg{display:flex;justify-content:space-between;background:#0d1b4b;color:#fff;border-radius:8px;padding:10px 14px;font-size:15px;font-weight:800;margin-top:6px}
.gst-btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:2px solid;transition:all .15s}
.gst-on{background:#0d1b4b;color:#fff;border-color:#0d1b4b}
.gst-off{background:#fff;color:#1e40af;border-color:#bfdbfe}
.tab-btn{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid;margin-right:6px;margin-bottom:6px}
.tab-on{background:#0d1b4b;color:#fff;border-color:#0d1b4b}
.tab-off{background:#fff;color:#555;border-color:#ddd}
.load{position:fixed;inset:0;background:linear-gradient(135deg,#0d1b4b,#1a3a8f);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:#fff}
.load img{height:80px;margin-bottom:20px}
.load h2{font-size:20px;font-weight:800;margin-bottom:8px}
.load p{font-size:13px;color:#93c5fd;margin-bottom:20px}
.spin{width:36px;height:36px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;right:20px;background:#22c55e;color:#fff;border-radius:12px;padding:10px 18px;font-size:13px;font-weight:800;box-shadow:0 4px 20px rgba(34,197,94,.4);z-index:9999;display:none;transition:opacity .4s}
.type-toggle{display:flex;gap:8px;margin-bottom:14px;background:#f0f4ff;padding:8px;border-radius:12px}
.type-btn{flex:1;padding:10px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:2px solid transparent;text-align:center}
.type-btn.on{background:#0d1b4b;color:#fff}
.type-btn.off{background:#fff;color:#555;border-color:#ddd}
@media(max-width:600px){
  .g2{grid-template-columns:1fr}
  .g3{grid-template-columns:1fr}
  .hdr-in{flex-direction:column;align-items:flex-start}
  .nav{width:100%}
  .nb{flex:1;text-align:center;font-size:11px;padding:6px 4px}
}
</style>
</head>

// ===== GST CALCULATION =====
function calcGST(products, gstType) {
  // Group by GST rate
  const groups = {};
  products.forEach(p => {
    const rate = parseFloat(p.gst||12);
    const amt = parseFloat(p.mrp||0) * parseInt(p.qty||1);
    if(!groups[rate]) groups[rate] = 0;
    groups[rate] += amt;
  });

  const rows = [];
  let totalTax = 0;
  let totalBase = 0;

  Object.entries(groups).forEach(([rate, amt]) => {
    const r = parseFloat(rate);
    const base = amt / (1 + r/100); // exclusive base
    const tax = amt - base;
    totalTax += tax;
    totalBase += base;
    if(r === 0) {
      rows.push({rate:r, base, tax:0, label:"Exempt"});
    } else if(gstType === "igst") {
      rows.push({rate:r, base, tax, label:`IGST ${r}%`});
    } else {
      rows.push({rate:r, base, tax:tax/2, label:`CGST ${r/2}%`});
      rows.push({rate:r, base, tax:tax/2, label:`SGST ${r/2}%`});
    }
  });

  return {rows, totalBase, totalTax, grand: totalBase + totalTax};
}

function iHTML(o, iNo, iDt, gstType) {
  const gst = calcGST(o.products, gstType);

  const prodRows = o.products.map((p,i) => {
    const amt = (parseFloat(p.mrp||0)*parseInt(p.qty||1)).toFixed(2);

    return `<tr><td>${i+1}</td><td><b>${p.name}</b>${p.cat?`<span style="display:inline-block;margin-left:5px;padding:1px 6px;border-radius:8px;font-size:9px;font-weight:700;${cs}">${p.cat}</span>`:""}</td><td>${p.pack||"—"}</td><td style="text-align:right">${p.gst||0}%</td><td style="text-align:right">${p.mrp?"₹"+parseFloat(p.mrp).toFixed(2):"—"}</td><td style="text-align:center"><b>${p.qty}</b></td><td style="text-align:right"><b>₹${amt}</b></td></tr>`;
  }).join("");

  const gstRows = gst.rows.map(r =>
    `<tr><td style="text-align:left">${r.label}</td><td style="text-align:right">₹${r.base.toFixed(2)}</td><td style="text-align:right">₹${r.tax.toFixed(2)}</td></tr>`
  ).join("");

  // Bill To
  let billToHTML = "";
  if(o.custType === "store") {
    billToHTML = `<div class="pn">${o.storeName||"Medical Store"}</div><div class="ps">${o.storeAddress||""}${o.storeContact?"<br/>📞 "+o.storeContact:""}${o.storeGstin?"<br/><b>GSTIN:</b> "+o.storeGstin:""}</div>`;
  } else if(o.custType === "both") {
    billToHTML = `<div class="pn">Dr. ${o.doctorName} / ${o.storeName||""}</div><div class="ps">${o.clinicName||""}${o.storeName?"<br/>🏪 "+o.storeName:""}${o.storeGstin?"<br/><b>GSTIN:</b> "+o.storeGstin:""}${o.phone?"<br/>📞 "+o.phone:""}</div>`;
  } else {
    billToHTML = `<div class="pn">Dr. ${o.doctorName}</div><div class="ps">${o.clinicName?o.clinicName+"<br/>":""}${[o.area,o.city,o.pincode].filter(Boolean).join(", ")}${o.phone?"<br/>📞 "+o.phone:""}</div>`;
  }

  return `<!DOCTYPE html><html><head><meta charset="UTF-8"/><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:sans-serif;font-size:13px}.pg{width:210mm;padding:10mm 14mm;margin:0 auto}.hd{display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid #1a3a8f;padding-bottom:12px}.logo{height:50px}.cn{font-size:13px;font-weight:800;color:#0d1b4b;text-align:right}.cs{font-size:11px;color:#555;text-align:right}.ib{background:linear-gradient(90deg,#0d1b4b,#1a3a8f);color:#fff;border-radius:8px;padding:10px 16px;margin:12px 0;display:flex;justify-content:space-between}.ib h2{font-size:18px;font-weight:800;letter-spacing:2px}.im{font-size:12px;line-height:1.8;text-align:right}.lb{background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;padding:5px 12px;margin-bottom:12px;font-size:11px;color:#1e40af;display:flex;gap:24px}.pts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}.pb{border:1px solid #dbeafe;border-radius:8px;padding:10px 14px;background:#f8faff}.pt{font-size:10px;font-weight:800;color:#1e40af;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;border-bottom:1px solid #dbeafe;padding-bottom:4px}.pn{font-size:13px;font-weight:800;color:#0d1b4b;margin-bottom:2px}.ps{font-size:11px;color:#555;line-height:1.6}table{width:100%;border-collapse:collapse;margin-bottom:10px}thead tr{background:#0d1b4b;color:#fff}thead th{padding:8px 10px;font-size:11px;font-weight:700;text-align:left}tbody tr:nth-child(even){background:#f8faff}tbody td{padding:7px 10px;font-size:12px;border-bottom:1px solid #e0ecff}.gtbl{width:100%;border-collapse:collapse;margin-bottom:10px;background:#f8faff}.gtbl th{background:#1e40af;color:#fff;padding:6px 10px;font-size:11px;text-align:right}.gtbl th:first-child{text-align:left}.gtbl td{padding:6px 10px;font-size:12px;border-bottom:1px solid #dbeafe}.tb2{margin-left:auto;width:260px;margin-bottom:12px}.tr2{display:flex;justify-content:space-between;padding:5px 10px;font-size:12px}.ts{background:#f0f4ff;border-radius:4px}.tgd{background:#0d1b4b;color:#fff;border-radius:6px;padding:8px 14px;font-weight:800;font-size:14px;margin-top:4px}.terms{background:#f0f4ff;border-radius:6px;padding:7px 12px;margin-bottom:10px;font-size:10px;color:#555;line-height:1.6}.ft{border-top:2px solid #bfdbfe;padding-top:10px;margin-top:8px;display:flex;justify-content:space-between}.sl{border-top:1px solid #333;width:140px;margin-top:38px;font-size:11px;padding-top:4px;text-align:center}@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}</style></head><body><div class="pg">
<div class="hd"><img class="logo" src="data:image/png;base64,${LOGO}"/><div><div class="cn">${CO.name}</div><div class="cs">${CO.a1}<br/>${CO.a2}</div><div class="cs">📞 ${CO.ph} | ✉ ${CO.em}</div></div></div>

  <div class="pb"><div class="pt">${o.custType==="store"?"🏪 Medical Store":o.custType==="both"?"👨‍⚕️ Doctor + 🏪 Store":"👨‍⚕️ Bill To"}</div>${billToHTML}</div>
</div>
<table><thead><tr><th>#</th><th>Product</th><th>Pack</th><th style="text-align:right">GST%</th><th style="text-align:right">MRP</th><th style="text-align:center">Qty</th><th style="text-align:right">Amount</th></tr></thead><tbody>${prodRows}</tbody></table>
<table class="gtbl"><thead><tr><th>GST Breakup</th><th style="text-align:right">Taxable Value</th><th style="text-align:right">Tax Amount</th></tr></thead><tbody>${gstRows}<tr style="font-weight:700;background:#dbeafe"><td>Total</td><td style="text-align:right">₹${gst.totalBase.toFixed(2)}</td><td style="text-align:right">₹${gst.totalTax.toFixed(2)}</td></tr></tbody></table>
<div class="tb2">
  <div class="tr2 ts"><span>Subtotal (incl. tax)</span><span>₹${totalAmt.toFixed(2)}</span></div>
  <div class="tr2" style="color:#1e40af;font-weight:600"><span>Total Tax</span><span>₹${gst.totalTax.toFixed(2)}</span></div>
  <div class="tr2 tgd"><span>GRAND TOTAL</span><span>₹${totalAmt.toFixed(2)}</span></div>
</div>

<div class="ft"><div><b style="color:#0d1b4b">${CO.short}</b><br/><span style="font-size:11px;color:#888">${CO.tg}</span></div><div class="sl">Authorised Signatory</div></div>
</div></body></html>`;

  let html="";

// ===== ACTIONS =====
function sv(v){S.view=v;if(v!=="form"){S.editId=null;S.form=bf();}render();}
function tp(name){const p=S.catalog.find(x=>x.name===name);if(!p)return;const i=S.form.products.findIndex(x=>x.name===name);if(i>=0)S.form.products.splice(i,1);else S.form.products.push({...p,qty:1,bonus:""});render();}
function rpo(name){S.form.products=S.form.products.filter(p=>p.name!==name);render();}
function up(name,field,val){const p=S.form.products.find(x=>x.name===name);if(p){p[field]=field==="qty"?(parseInt(val)||1):parseFloat(val)||val;}render();}
function vd(id){S.detail=S.orders.find(o=>o._id===id)||null;S.view="detail";render();}
function se(id){const o=S.orders.find(x=>x._id===id);if(!o)return;S.form={...o,products:o.products.map(p=>({...p}))};S.editId=o._id;S.view="form";render();}

async function so(){
  const f=S.form;
  const valid=(f.custType==="doctor"&&f.doctorName&&f.phone)||(f.custType==="store"&&f.storeName)||(f.custType==="both"&&f.doctorName&&f.storeName);
  if(!valid||f.products.length===0)return;
  const data={...f,date:new Date().toLocaleDateString("en-IN"),createdAt:Date.now()};
  try{
    if(S.editId){const ex=S.orders.find(x=>x._id===S.editId);if(ex){data.orderNo=ex.orderNo;data.date=ex.date;data.createdAt=ex.createdAt;}await db.collection("orders").doc(S.editId).update(data);}
    else{data.orderNo="ADH-"+String(Date.now()).slice(-6);await db.collection("orders").add(data);}
    toast("☁️ Order Saved!");S.form=bf();S.pSearch="";S.pCat="All";S.editId=null;S.view="list";render();
  }catch(e){toast("❌ "+e.message,"#ef4444");}
}
async function do2(id){if(!confirm("Delete this order?"))return;try{await db.collection("orders").doc(id).delete();toast("🗑️ Deleted");S.view="list";render();}catch(e){toast("❌ "+e.message,"#ef4444");}}
async function ap(){
  const n=S.newP.name.trim();if(!n)return;
  if(S.catalog.some(p=>p.name.toLowerCase()===n.toLowerCase())){S.catErr="Already exists!";render();return;}
  try{await db.collection("catalog").add({...S.newP,name:n,gst:parseFloat(S.newP.gst||12)});toast("💊 Added!");S.newP={name:"",pack:"",mrp:"",cat:"General",gst:12};S.catErr="";render();}
  catch(e){toast("❌ "+e.message,"#ef4444");}
}
async function rp(id,name){if(!confirm("Remove "+name+"?"))return;try{await db.collection("catalog").doc(id).delete();toast("🗑️ Removed");render();}catch(e){toast("❌ "+e.message,"#ef4444");}}
function oi(id){const o=S.orders.find(x=>x._id===id);if(!o)return;S.invOrd={...o,products:o.products.map(p=>({...p}))};S.invNo="INV-"+String(Date.now()).slice(-6);S.invDate=td();S.inv=true;render();}
function uip(name,field,val){if(!S.invOrd)return;const p=S.invOrd.products.find(x=>x.name===name);if(p){p[field]=field==="qty"?(parseInt(val)||1):parseFloat(val)||val;}render();}
function po(id){const o=S.orders.find(x=>x._id===id);if(o)pp(oHTML(o));}
function pi(){if(S.invOrd)pp(iHTML(S.invOrd,S.invNo,S.invDate,S.gstType));}

// ===== BOOT =====
async function boot(){
  try{
    const snap=await db.collection("catalog").limit(1).get();
    if(snap.empty){
      document.getElementById("ld-msg").textContent="First time setup...";
      for(const p of PRODS) await db.collection("catalog").add(p);
    }
    db.collection("orders").orderBy("createdAt","desc").onSnapshot(snap=>{
      S.orders=snap.docs.map(d=>({...d.data(),_id:d.id}));
      S.live=true;
      document.getElementById("ld").style.display="none";
      document.getElementById("app").style.display="block";
      render();
    },err=>document.getElementById("ld-msg").textContent="Error: "+err.message);
    db.collection("catalog").onSnapshot(snap=>{S.catalog=snap.docs.map(d=>({...d.data(),_id:d.id}));render();});
  }catch(e){
    document.getElementById("ld-msg").textContent="Failed: "+e.message;
    document.getElementById("ld").innerHTML+=`<button onclick="location.reload()" style="margin-top:20px;background:#fff;color:#0d1b4b;border:none;border-radius:10px;padding:12px 28px;font-size:15px;font-weight:800;cursor:pointer">🔄 Retry</button>`;
  }
}
boot();
</script>
</body>
</html>
