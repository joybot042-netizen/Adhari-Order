<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Adhari Orders"/>
<meta name="theme-color" content="#0d1b4b"/>
<title>Adhari Pharmaceuticals - Order App</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans','Segoe UI',sans-serif;background:#f0f4ff;min-height:100vh;color:#111}
input,select,textarea,button{font-family:'DM Sans','Segoe UI',sans-serif}
.header{background:linear-gradient(135deg,#0d1b4b,#1a3a8f,#2563eb);padding:12px 16px;box-shadow:0 3px 16px rgba(13,27,75,0.3);position:sticky;top:0;z-index:100}
.header-inner{max-width:980px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-wrap img{height:44px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3))}
.co-name{color:#fff;font-weight:800;font-size:14px}
.co-sub{color:#93c5fd;font-size:10px;margin-top:1px}
.co-sub2{color:#bfdbfe;font-size:9.5px;margin-top:1px}
.nav-wrap{display:flex;gap:6px;background:rgba(0,0,0,0.2);border-radius:10px;padding:5px 6px}
.nav-btn{border:2px solid rgba(255,255,255,0.6);background:rgba(255,255,255,0.15);color:#fff;border-radius:8px;padding:6px 12px;cursor:pointer;font-weight:700;font-size:12px;display:flex;align-items:center;gap:4px}
.nav-btn.active{background:#fff;color:#0d1b4b;border-color:#fff;box-shadow:0 2px 6px rgba(0,0,0,0.2)}
.tagline{background:#dbeafe;border-bottom:1px solid #bfdbfe;padding:5px;text-align:center;font-size:11px;font-weight:700;color:#1e40af;letter-spacing:1px;display:flex;align-items:center;justify-content:center;gap:8px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block}
.sync-dot.offline{background:#f59e0b}
.sync-dot.syncing{background:#3b82f6;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.main{max-width:980px;margin:0 auto;padding:18px 12px}
.card{background:#fff;border-radius:14px;border:1.5px solid #dbeafe;padding:14px 18px;box-shadow:0 2px 8px rgba(26,58,143,0.07);margin-bottom:10px}
.card.clickable{cursor:pointer}
.form-box{background:#fff;border-radius:18px;border:1.5px solid #dbeafe;padding:22px;box-shadow:0 4px 20px rgba(26,58,143,0.1)}
.section{background:#f8faff;border-radius:12px;padding:14px 16px;margin-bottom:14px;border:1px solid #dbeafe}
.section-blue{background:#f0f7ff;border-radius:12px;padding:14px 16px;margin-bottom:14px;border:1px solid #bfdbfe}
.sec-title{font-weight:800;color:#0d1b4b;font-size:11px;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px}
.inp{width:100%;padding:9px 12px;border-radius:8px;border:1.5px solid #bfdbfe;font-size:14px;outline:none;background:#fff;font-family:inherit}
.inp:focus{border-color:#1a3a8f}
.lbl{font-size:11px;color:#1e40af;font-weight:700;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.4px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.badge{display:inline-flex;align-items:center;border-radius:20px;padding:3px 12px;font-size:11px;font-weight:700;border:1.5px solid}
.badge-blue{background:#eff6ff;color:#1e40af;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:800}
.cat-tag{font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px}
.cat-av{background:#fef3c7;color:#92400e;border:1px solid #fcd34d}
.cat-blue{background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe}
.prod-tag{border-radius:20px;padding:2px 9px;font-size:11px;font-weight:600;border:1px solid}
.prod-btn{padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;font-weight:700;border:1.5px solid}
.table-head{background:#0d1b4b;color:#fff;padding:9px 16px;font-weight:800;font-size:12px}
table{width:100%;border-collapse:collapse}
thead tr{background:#eff6ff}
thead th{padding:7px 10px;font-size:11px;font-weight:800;color:#1e40af;text-align:left}
tbody tr:nth-child(even){background:#f8faff}
tbody td{padding:7px 10px;font-size:12px;border-bottom:1px solid #dbeafe}
.tbl-wrap{border-radius:12px;overflow:hidden;border:1.5px solid #bfdbfe;margin-bottom:14px}
.btn-primary{background:#0d1b4b;color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:800;cursor:pointer;width:100%}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.btn-secondary{padding:12px 20px;background:transparent;color:#888;border:1.5px solid #ddd;border-radius:10px;font-size:14px;cursor:pointer}
.btn-pdf{background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe;border-radius:6px;padding:4px 9px;font-size:11px;cursor:pointer;font-weight:700}
.btn-inv{background:#0d1b4b;color:#fff;border:none;border-radius:6px;padding:4px 9px;font-size:11px;cursor:pointer;font-weight:700}
.btn-danger{background:#fce4ec;color:#c62828;border:1px solid #ef9a9a;border-radius:7px;padding:5px 12px;font-size:12px;cursor:pointer;font-weight:700}
.total-box{background:#f0f7ff;border-radius:10px;padding:12px 16px;margin-bottom:16px;border:1.5px solid #bfdbfe}
.total-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px}
.total-grand{display:flex;justify-content:space-between;background:#0d1b4b;color:#fff;border-radius:8px;padding:10px 14px;font-size:15px;font-weight:800;margin-top:6px}
.empty{text-align:center;padding:50px 0;color:#aaa}
.empty-icon{font-size:48px;margin-bottom:10px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:1000;display:flex;align-items:center;justify-content:center;padding:12px}
.modal{background:#fff;border-radius:18px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.4)}
.modal-header{background:linear-gradient(90deg,#0d1b4b,#1a3a8f);padding:16px 20px;border-radius:18px 18px 0 0;display:flex;justify-content:space-between;align-items:center}
.modal-body{padding:20px}
.qty-inp{width:54px;padding:4px 6px;border-radius:6px;border:1.5px solid #93c5fd;font-size:13px;font-weight:700;text-align:center;outline:none;background:#eff6ff}
.mrp-inp{width:70px;padding:4px 6px;border-radius:6px;border:1.5px solid #bfdbfe;font-size:12px;text-align:right;outline:none}
.bonus-inp{width:58px;padding:4px 6px;border-radius:6px;border:1.5px solid #bfdbfe;font-size:12px;outline:none}
.search-wrap{display:flex;gap:10px;margin-bottom:14px;align-items:center}
.order-count{background:#1a3a8f;color:#fff;border-radius:8px;padding:9px 14px;font-size:13px;font-weight:700;white-space:nowrap}
.status-wrap{text-align:right;margin-left:10px;display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.cat-filter{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.cat-filter-btn{padding:3px 11px;border-radius:20px;font-size:11px;cursor:pointer;font-weight:700;border:1.5px solid}
.prod-list{display:flex;flex-wrap:wrap;gap:6px;max-height:140px;overflow-y:auto;padding:2px}
.loading-screen{position:fixed;inset:0;background:linear-gradient(135deg,#0d1b4b,#1a3a8f);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:#fff}
.loading-screen img{height:80px;margin-bottom:20px;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.4))}
.loading-screen h2{font-size:20px;font-weight:800;margin-bottom:8px}
.loading-screen p{font-size:13px;color:#93c5fd}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;margin-top:20px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){
  .grid2{grid-template-columns:1fr}
  .header-inner{flex-direction:column;align-items:flex-start}
  .nav-wrap{width:100%}
  .nav-btn{flex:1;justify-content:center;font-size:11px;padding:6px 4px}
}
</style>
</head>

async function initCatalog(){
  const snap = await getDocs(collection(db,"catalog"));
  if(snap.empty){
    // First time - seed catalog
    for(const p of INIT_PRODUCTS){
      await setDoc(doc(collection(db,"catalog")),p);
    }
  }
}

function startListeners(){
  // Orders - real time
  onSnapshot(collection(db,"orders"),(snap)=>{
    state.orders = snap.docs.map(d=>({...d.data(),_id:d.id}))
      .sort((a,b)=>b.createdAt-a.createdAt);
    syncStatus="online";
    if(document.getElementById("app").style.display==="none"){
      document.getElementById("loading-screen").style.display="none";
      document.getElementById("app").style.display="block";
    }
    render();
  },(err)=>{syncStatus="offline";render();});

  // Catalog - real time
  onSnapshot(collection(db,"catalog"),(snap)=>{
    state.catalog = snap.docs.map(d=>({...d.data(),_id:d.id}));
    render();
  });
}

  const rows=o.products.map((p,i)=>{const amt=p.mrp?(parseFloat(p.mrp)*parseInt(p.qty||1)).toFixed(2):"—";const catSt=p.cat==="Antiviral"?"background:#fef3c7;color:#92400e":"background:#eff6ff;color:#1e40af";return`<tr><td>${i+1}</td><td><b>${p.name}</b>${p.cat?`<span style="display:inline-block;margin-left:5px;padding:1px 6px;border-radius:8px;font-size:9px;font-weight:700;${catSt}">${p.cat}</span>`:""}</td><td>${p.pack||"—"}</td><td style="text-align:right">${p.mrp?"₹"+parseFloat(p.mrp).toFixed(2):"—"}</td><td style="text-align:center"><b>${p.qty}</b></td><td style="text-align:right"><b>${p.mrp?"₹"+amt:"—"}</b></td></tr>`;}).join("");

ght:800;font-size:14px;margin-top:4px}.terms{background:#f0f4ff;border-radius:6px;padding:7px 12px;margin-bottom:10px;font-size:10px;color:#555;line-height:1.6}.ft{border-top:2px solid #bfdbfe;padding-top:10px;margin-top:8px;display:flex;justify-content:space-between;align-items:flex-end}.sl{border-top:1px solid #333;width:150px;margin-top:38px;font-size:11px;color:#555;padding-top:4px;text-align:center}@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}</style></head><body><div class="pg"><div class="hd"><img class="logo" src="data:image/png;base64,${LOGO}" alt="logo"/><div><div class="cn">${COMPANY.name}</div><div class="cs">${COMPANY.addr1}<br/>${COMPANY.addr2}</div><div class="cs">📞 ${COMPANY.phone} | ✉ ${COMPANY.email}</div></div></div><div class="ib"><h2>TAX INVOICE</h2><div class="im"><div><b>Invoice No:</b> ${invNo}</div><div><b>Date:</b> ${dt}</div><div><b>Order Ref:</b> ${o.orderNo}</div></div></div><div class="lb"><span><b>GSTIN:</b> ${COMPANY.gstin}</span><span><b>Drug Lic:</b> ${COMPANY.drug}</span></div><div class="pts"><div class="pb"><div class="pt">🏢 Sold By</div><div class="pn">${COMPANY.short}</div><div class="ps">${COMPANY.addr1}<br/>${COMPANY.addr2}<br/>📞 ${COMPANY.phone}</div></div><div class="pb"><div class="pt">👨‍⚕️ Bill To</div><div class="pn">Dr. ${o.doctorName}</div><div class="ps">${o.clinicName?o.clinicName+"<br/>":""}${o.address?o.address+"<br/>":""}${[o.area,o.city,o.pincode].filter(Boolean).join(", ")}${o.phone?"<br/>📞 "+o.phone:""}</div></div></div><table><thead><tr><th>#</th><th>Product</th><th>Pack</th><th style="text-align:right">MRP</th><th style="text-align:center">Qty</th><th style="text-align:right">Amount</th></tr></thead><tbody>${rows}</tbody></table><div class="tb2"><div class="tr2 ts"><span>Subtotal</span><span>₹${sub.toFixed(2)}</span></div><div class="tr2 tg"><span>GST (12%)</span><span>₹${gst}</span></div><div class="tr2 tgd"><span>GRAND TOTAL</span><span>₹${grand}</span></div></div><div class="terms"><b>Terms &amp; Conditions:</b> Goods once sold will not be taken back. Subject to Mumbai jurisdiction only. Payment due within 30 days. Computer generated invoice.</div><div class="ft"><div><b style="color:#0d1b4b">${COMPANY.short}</b><br/><span style="font-size:11px;color:#888">${COMPANY.tagline}</span><br/><span style="font-size:11px;color:#888">📞 ${COMPANY.phone} | ${COMPANY.email}</span></div><div class="sl">Authorised Signatory</div></div></div></body></html>`;
}

function badge(s){const t=ST[s]||ST.Pending;return`<span class="badge" style="background:${t.bg};color:${t.color};border-color:${t.bd}">${s}</span>`;}
function prodTag(p){const av=p.cat==="Antiviral";return`<span class="prod-tag" style="background:${av?"#fef3c7":"#eff6ff"};color:${av?"#92400e":"#1e40af"};border-color:${av?"#fcd34d":"#bfdbfe"}">${p.name} ×${p.qty}</span>`;}

    const o=s.invOrder;
    const sub=calcSub(o.products);const gst=sub*0.12;const grand=sub+gst;
    const rows=o.products.map((p,i)=>`<tr style="border-bottom:1px solid #dbeafe;background:${i%2===0?"#fff":"#f8faff"}"><td style="padding:7px 10px">${catTag(p.cat)}<div style="font-weight:700;color:#0d1b4b;font-size:13px">${p.name}</div></td><td style="padding:7px 10px;font-size:12px;color:#666">${p.pack||"—"}</td><td style="padding:7px 6px;text-align:right"><input class="mrp-inp" type="number" value="${p.mrp}" onchange="updInvProd('${p.name}','mrp',this.value)"/></td><td style="padding:7px 6px;text-align:right"><input class="qty-inp" type="number" min="1" value="${p.qty}" onchange="updInvProd('${p.name}','qty',this.value)"/></td><td style="padding:7px 10px;text-align:right;font-weight:700;color:#0d1b4b">${p.mrp?"₹"+(parseFloat(p.mrp)*parseInt(p.qty||1)).toFixed(2):"—"}</td></tr>`).join("");
    modalHTML=`<div class="modal-overlay" onclick="if(event.target===this)setState({showInv:false})"><div class="modal">
      <div class="modal-header">
        <div><div style="color:#fff;font-weight:800;font-size:17px">🧾 Generate Tax Invoice</div><div style="color:#93c5fd;font-size:12px;margin-top:2px">${o.orderNo} — Dr. ${o.doctorName}</div></div>
        <button onclick="setState({showInv:false})" style="background:rgba(255,255,255,0.2);color:#fff;border:none;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:16px;font-weight:800">✕</button>
      </div>
      <div class="modal-body">
        <div class="grid2" style="margin-bottom:14px">
          <div><label class="lbl">Invoice Number</label><input class="inp" style="font-weight:700" value="${s.invNo}" oninput="setState({invNo:this.value})"/></div>
          <div><label class="lbl">Invoice Date</label><input class="inp" type="date" value="${s.invDate}" oninput="setState({invDate:this.value})"/></div>
        </div>
        <div style="background:#f0f7ff;border-radius:10px;padding:11px 14px;margin-bottom:14px;border:1.5px solid #dbeafe">
          <div style="font-size:11px;font-weight:800;color:#1e40af;text-transform:uppercase;margin-bottom:4px">👨‍⚕️ Bill To</div>
          <div style="font-weight:800;color:#0d1b4b;font-size:15px">Dr. ${o.doctorName}</div>
          <div style="color:#555;font-size:13px">${o.clinicName?o.clinicName+" • ":""}${[o.area,o.city].filter(Boolean).join(", ")}${o.phone?" • 📞 "+o.phone:""}</div>
        </div>
        <div class="tbl-wrap"><div class="table-head">💊 ITEMS — Edit MRP / Qty if needed</div>
          <table><thead><tr>${["Product","Pack","MRP ₹","Qty","Amount"].map((h,i)=>`<th style="text-align:${i>=2?"right":"left"}">${h}</th>`).join("")}</tr></thead>
          <tbody>${rows}</tbody></table>
        </div>
        <div class="total-box">
          <div class="total-row"><span style="color:#555">Subtotal</span><span style="font-weight:600">₹${sub.toFixed(2)}</span></div>
          <div class="total-row" style="color:#1e40af"><span>GST (12%)</span><span style="font-weight:600">₹${gst.toFixed(2)}</span></div>
          <div class="total-grand"><span>GRAND TOTAL</span><span>₹${grand.toFixed(2)}</span></div>
        </div>
        <div style="display:flex;gap:12px">
          <button onclick="doPrintInvoice()" style="flex:1;background:#0d1b4b;color:#fff;border:2px solid #fcd34d;border-radius:10px;padding:13px;font-size:15px;font-weight:800;cursor:pointer">🖨️ Print / Save as PDF</button>
          <button class="btn-secondary" onclick="setState({showInv:false})">Cancel</button>
        </div>
      </div>
    </div></div>`;
  }

  const navBtn=(v,icon,label)=>`<button class="nav-btn ${state.view===v?"active":""}" onclick="setView('${v}')">${icon} ${label}</button>`;

  document.getElementById("app").innerHTML=`
    <div class="header"><div class="header-inner">
      <div class="logo-wrap">
        <img src="data:image/png;base64,${LOGO}" alt="Adhari"/>
        <div>
          <div class="co-name">Adhari Pharmaceuticals Pvt. Ltd.</div>
          <div class="co-sub">📞 ${COMPANY.phone} | ✉ ${COMPANY.email}</div>
          <div class="co-sub2">GSTIN: ${COMPANY.gstin} | Drug Lic: ${COMPANY.drug}</div>
        </div>
      </div>
      <div class="nav-wrap">
        ${navBtn("list","📋","Orders")}
        ${navBtn("form","➕","New Order")}
        ${navBtn("catalog","⚙️","Products")}
      </div>
    </div></div>
    <div class="tagline">
      ✦ ${COMPANY.tagline} ✦
      <span style="font-size:10px;font-weight:700;color:${syncColor};margin-left:8px">${syncLabel}</span>
    </div>
    <div class="main">${mainHTML}</div>
    ${modalHTML}
  `;
}

// ---- Actions ----
function setForm(k,v){state.form[k]=v;}
function setNewP(k,v){state.newP[k]=v;}

function toggleProd(name){
  const p=state.catalog.find(x=>x.name===name);
  if(!p)return;
  const idx=state.form.products.findIndex(x=>x.name===name);
  if(idx>=0)state.form.products.splice(idx,1);
  else state.form.products.push({...p,qty:1,bonus:""});
  render();
}
function removeProdFromOrder(name){state.form.products=state.form.products.filter(p=>p.name!==name);render();}
function updProd(name,field,val){const p=state.form.products.find(x=>x.name===name);if(p){p[field]=field==="qty"?(parseInt(val)||1):val;}render();}

async function saveOrder(){
  const f=state.form;
  if(!f.doctorName||!f.phone||f.products.length===0)return;
  const data={...f,date:new Date().toLocaleDateString("en-IN"),createdAt:Date.now()};
  if(state.editId){
    const existing=state.orders.find(x=>x._id===state.editId);
    if(existing){data.orderNo=existing.orderNo;data.date=existing.date;data.createdAt=existing.createdAt;}
    await updateDoc(doc(db,"orders",state.editId),data);
    state.editId=null;
  } else {
    data.orderNo="ADH-"+String(Date.now()).slice(-6);
    await addDoc(collection(db,"orders"),data);
  }
  showToast("☁️ Order Saved!");
  state.form=blankForm(); state.pSearch=""; state.pCat="All"; state.view="list"; render();
}

function viewDetail(id){state.detail=state.orders.find(o=>o._id===id)||null;state.view="detail";render();}

function startEdit(id){
  const o=state.orders.find(x=>x._id===id);
  if(!o)return;
  state.form={...o,products:o.products.map(p=>({...p}))};
  state.editId=o._id; state.view="form"; render();
}

async function delOrder(id){
  if(!confirm("Delete this order?"))return;
  await deleteDoc(doc(db,"orders",id));
  showToast("🗑️ Order Deleted");
  state.view="list"; render();
}

async function addProd(){
  const n=state.newP.name.trim();
  if(!n)return;
  if(state.catalog.some(p=>p.name.toLowerCase()===n.toLowerCase())){state.catErr="Already exists!";render();return;}
  await addDoc(collection(db,"catalog"),{...state.newP,name:n});
  showToast("💊 Product Added!");
  state.newP={name:"",pack:"",mrp:"",cat:"General"}; state.catErr=""; render();
}

async function remProd(id,name){
  if(!confirm("Remove "+name+"?"))return;
  await deleteDoc(doc(db,"catalog",id));
  state.orders.forEach(o=>o.products=o.products.filter(p=>p.name!==name));
  showToast("🗑️ Product Removed");
  render();
}

function doOpenInv(id){
  const o=state.orders.find(x=>x._id===id);
  if(!o)return;
  state.invOrder={...o,products:o.products.map(p=>({...p}))};
  state.invNo="INV-"+String(Date.now()).slice(-6);
  state.invDate=today(); state.showInv=true; render();
}
function updInvProd(name,field,val){if(!state.invOrder)return;const p=state.invOrder.products.find(x=>x.name===name);if(p){p[field]=field==="qty"?(parseInt(val)||1):val;}render();}
function doPrintOrder(id){const o=state.orders.find(x=>x._id===id);if(o)openPrint(buildOrderHTML(o));}
function doPrintInvoice(){if(state.invOrder)openPrint(buildInvoiceHTML(state.invOrder,state.invNo,state.invDate));}

// Make functions global
window.setState=setState; window.setView=setView; window.setForm=setForm; window.setNewP=setNewP;
window.toggleProd=toggleProd; window.removeProdFromOrder=removeProdFromOrder; window.updProd=updProd;
window.saveOrder=saveOrder; window.viewDetail=viewDetail; window.startEdit=startEdit; window.delOrder=delOrder;
window.addProd=addProd; window.remProd=remProd; window.doOpenInv=doOpenInv; window.updInvProd=updInvProd;
window.doPrintOrder=doPrintOrder; window.doPrintInvoice=doPrintInvoice;

// ---- Boot ----
async function boot(){
  try {
    await initCatalog();
    startListeners();
  } catch(e){
    document.getElementById("loading-screen").innerHTML=`
      <img src="data:image/png;base64,${LOGO}" alt="Adhari"/>
      <h2 style="color:#fff">Connection Failed</h2>
      <p style="color:#fca5a5;margin-top:8px">Please check your internet and reload</p>
      <button onclick="location.reload()" style="margin-top:20px;background:#fff;color:#0d1b4b;border:none;border-radius:10px;padding:12px 28px;font-size:15px;font-weight:800;cursor:pointer">🔄 Retry</button>`;
  }
}

boot();
</script>
</body>
</html>
