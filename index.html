<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Adhari Orders"/>
<meta name="theme-color" content="#0d1b4b"/>
<title>Adhari Pharmaceuticals</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

<!-- Firebase MUST load first -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans','Segoe UI',sans-serif;background:#f0f4ff;min-height:100vh}
input,select,textarea,button{font-family:inherit}
.hdr{background:linear-gradient(135deg,#0d1b4b,#1a3a8f,#2563eb);padding:12px 16px;position:sticky;top:0;z-index:100;box-shadow:0 3px 16px rgba(13,27,75,0.3)}
.hdr-in{max-width:980px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.logo-w{display:flex;align-items:center;gap:10px}
.logo-w img{height:44px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3))}
.co-n{color:#fff;font-weight:800;font-size:14px}
.co-s{color:#93c5fd;font-size:10px;margin-top:1px}
.co-s2{color:#bfdbfe;font-size:9.5px;margin-top:1px}
.nav{display:flex;gap:6px;background:rgba(0,0,0,0.2);border-radius:10px;padding:5px 6px}
.nb{border:2px solid rgba(255,255,255,0.6);background:rgba(255,255,255,0.15);color:#fff;border-radius:8px;padding:6px 12px;cursor:pointer;font-weight:700;font-size:12px}
.nb.on{background:#fff;color:#0d1b4b;border-color:#fff}
.tgl{background:#dbeafe;border-bottom:1px solid #bfdbfe;padding:5px;text-align:center;font-size:11px;font-weight:700;color:#1e40af;letter-spacing:1px}
.main{max-width:980px;margin:0 auto;padding:18px 12px}
.card{background:#fff;border-radius:14px;border:1.5px solid #dbeafe;padding:14px 18px;box-shadow:0 2px 8px rgba(26,58,143,0.07);margin-bottom:10px;cursor:pointer}
.box{background:#fff;border-radius:18px;border:1.5px solid #dbeafe;padding:22px;box-shadow:0 4px 20px rgba(26,58,143,0.1)}
.sec{background:#f8faff;border-radius:12px;padding:14px 16px;margin-bottom:14px;border:1px solid #dbeafe}
.sec2{background:#f0f7ff;border-radius:12px;padding:14px 16px;margin-bottom:14px;border:1px solid #bfdbfe}
.stl{font-weight:800;color:#0d1b4b;font-size:11px;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.inp{width:100%;padding:9px 12px;border-radius:8px;border:1.5px solid #bfdbfe;font-size:14px;outline:none;background:#fff;font-family:inherit}
.inp:focus{border-color:#1a3a8f}
.lbl{font-size:11px;color:#1e40af;font-weight:700;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.th{background:#0d1b4b;color:#fff;padding:9px 16px;font-weight:800;font-size:12px}
.tw{border-radius:12px;overflow:hidden;border:1.5px solid #bfdbfe;margin-bottom:14px}
table{width:100%;border-collapse:collapse}
thead tr{background:#eff6ff}
thead th{padding:7px 10px;font-size:11px;font-weight:800;color:#1e40af;text-align:left}
tbody tr:nth-child(even){background:#f8faff}
tbody td{padding:7px 10px;font-size:12px;border-bottom:1px solid #dbeafe}
.bp{background:#0d1b4b;color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:800;cursor:pointer;width:100%}
.bp:disabled{opacity:.5;cursor:not-allowed}
.bs{padding:12px 20px;background:transparent;color:#888;border:1.5px solid #ddd;border-radius:10px;font-size:14px;cursor:pointer}
.bd{background:#fce4ec;color:#c62828;border:1px solid #ef9a9a;border-radius:7px;padding:5px 12px;font-size:12px;cursor:pointer;font-weight:700}
.qi{width:54px;padding:4px 6px;border-radius:6px;border:1.5px solid #93c5fd;font-size:13px;font-weight:700;text-align:center;outline:none;background:#eff6ff}
.mi{width:70px;padding:4px 6px;border-radius:6px;border:1.5px solid #bfdbfe;font-size:12px;text-align:right;outline:none}
.bi{width:58px;padding:4px 6px;border-radius:6px;border:1.5px solid #bfdbfe;font-size:12px;outline:none}
.empty{text-align:center;padding:50px 0;color:#aaa}
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:1000;display:flex;align-items:center;justify-content:center;padding:12px}
.mod{background:#fff;border-radius:18px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.mhd{background:linear-gradient(90deg,#0d1b4b,#1a3a8f);padding:16px 20px;border-radius:18px 18px 0 0;display:flex;justify-content:space-between;align-items:center}
.mbd{padding:20px}
.tr{display:flex;justify-content:space-between;padding:4px 0;font-size:13px}
.tg{display:flex;justify-content:space-between;background:#0d1b4b;color:#fff;border-radius:8px;padding:10px 14px;font-size:15px;font-weight:800;margin-top:6px}
/* Loading */
.load{position:fixed;inset:0;background:linear-gradient(135deg,#0d1b4b,#1a3a8f);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:#fff}
.load img{height:80px;margin-bottom:20px}
.load h2{font-size:20px;font-weight:800;margin-bottom:8px}
.load p{font-size:13px;color:#93c5fd;margin-bottom:20px}
.spin{width:36px;height:36px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
/* Toast */
.toast{position:fixed;bottom:24px;right:20px;background:#22c55e;color:#fff;border-radius:12px;padding:10px 18px;font-size:13px;font-weight:800;box-shadow:0 4px 20px rgba(34,197,94,.4);z-index:9999;display:none;transition:opacity .4s}
@media(max-width:600px){
  .g2{grid-template-columns:1fr}
  .hdr-in{flex-direction:column;align-items:flex-start}
  .nav{width:100%}
  .nb{flex:1;text-align:center;font-size:11px;padding:6px 4px}
}
</style>
</head>

// ===== TOAST =====
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.style.display="block"; t.style.opacity="1";
  clearTimeout(window._tt);
  window._tt=setTimeout(()=>{t.style.opacity="0";setTimeout(()=>t.style.display="none",400);},2500);
}

function ctag(c){
  if(!c)return"";
  const av=c==="Antiviral";
  return`<span style="font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;background:${av?"#fef3c7":"#eff6ff"};color:${av?"#92400e":"#1e40af"};border:1px solid ${av?"#fcd34d":"#bfdbfe"}">${av?"🦠 ":""}${c}</span>`;
}
function sbadge(s){
  const t=ST[s]||ST.Pending;
  return`<span style="background:${t.bg};color:${t.cl};border:1.5px solid ${t.bd};border-radius:20px;padding:3px 12px;font-size:11px;font-weight:700">${s}</span>`;
}
function ptag(p){
  const av=p.cat==="Antiviral";
  return`<span style="background:${av?"#fef3c7":"#eff6ff"};color:${av?"#92400e":"#1e40af"};border:1px solid ${av?"#fcd34d":"#bfdbfe"};border-radius:20px;padding:2px 9px;font-size:11px;font-weight:600">${p.name} ×${p.qty}</span>`;
}

0px;color:#555;line-height:1.6}.ft{border-top:2px solid #bfdbfe;padding-top:10px;margin-top:8px;display:flex;justify-content:space-between}.sl{border-top:1px solid #333;width:140px;margin-top:38px;font-size:11px;padding-top:4px;text-align:center}@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}</style></head><body><div class="pg"><div class="hd"><img class="logo" src="data:image/png;base64,${LOGO}"/><div><div class="cn">${CO.name}</div><div class="cs">${CO.a1}<br/>${CO.a2}</div><div class="cs">📞 ${CO.ph} | ✉ ${CO.em}</div></div></div><div class="ib"><h2>TAX INVOICE</h2><div class="im"><div><b>Invoice No:</b> ${iNo}</div><div><b>Date:</b> ${fdt(iDt)}</div><div><b>Order:</b> ${o.orderNo}</div></div></div><div class="lb"><span><b>GSTIN:</b> ${CO.gs}</span><span><b>Drug Lic:</b> ${CO.dr}</span></div><div class="pts"><div class="pb"><div class="pt">🏢 Sold By</div><div class="pn">${CO.short}</div><div class="ps">${CO.a1}<br/>${CO.a2}<br/>📞 ${CO.ph}</div></div><div class="pb"><div class="pt">👨‍⚕️ Bill To</div><div class="pn">Dr. ${o.doctorName}</div><div class="ps">${o.clinicName?o.clinicName+"<br/>":""}${[o.area,o.city,o.pincode].filter(Boolean).join(", ")}${o.phone?"<br/>📞 "+o.phone:""}</div></div></div><table><thead><tr><th>#</th><th>Product</th><th>Pack</th><th style="text-align:right">MRP</th><th style="text-align:center">Qty</th><th style="text-align:right">Amount</th></tr></thead><tbody>${rows}</tbody></table><div class="tb2"><div class="tr2 ts"><span>Subtotal</span><span>₹${s.toFixed(2)}</span></div><div class="tr2" style="color:#1e40af;font-weight:600"><span>GST 12%</span><span>₹${g}</span></div><div class="tr2 tgd"><span>GRAND TOTAL</span><span>₹${gr}</span></div></div><div class="terms"><b>Terms:</b> Goods once sold will not be taken back. Subject to Mumbai jurisdiction. Payment due within 30 days.</div><div class="ft"><div><b style="color:#0d1b4b">${CO.short}</b><br/><span style="font-size:11px;color:#888">${CO.tg}</span></div><div class="sl">Authorised Signatory</div></div></div></body></html>`;
}

  if(s.inv&&s.invOrd){
    const o=s.invOrd,sb=sub(o.products),gs=sb*.12,gr=sb+gs;
    const rows=o.products.map((p,i)=>`<tr style="border-bottom:1px solid #dbeafe;background:${i%2===0?"#fff":"#f8faff"}"><td style="padding:7px 10px">${ctag(p.cat)}<div style="font-weight:700;color:#0d1b4b;font-size:13px">${p.name}</div></td><td style="padding:7px 10px;font-size:12px;color:#666">${p.pack||"—"}</td><td style="padding:7px 6px;text-align:right"><input class="mi" type="number" value="${p.mrp}" onchange="uip('${p.name}','mrp',this.value)"/></td><td style="padding:7px 6px;text-align:right"><input class="qi" type="number" min="1" value="${p.qty}" onchange="uip('${p.name}','qty',this.value)"/></td><td style="padding:7px 10px;text-align:right;font-weight:700;color:#0d1b4b">${p.mrp?"₹"+(parseFloat(p.mrp)*parseInt(p.qty||1)).toFixed(2):"—"}</td></tr>`).join("");
    mod=`<div class="ov" onclick="if(event.target===this)set({inv:false})"><div class="mod">
      <div class="mhd"><div><div style="color:#fff;font-weight:800;font-size:17px">🧾 Tax Invoice</div><div style="color:#93c5fd;font-size:12px;margin-top:2px">${o.orderNo} — Dr. ${o.doctorName}</div></div><button onclick="set({inv:false})" style="background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:16px;font-weight:800">✕</button></div>
      <div class="mbd">
        <div class="g2" style="margin-bottom:14px">
          <div><label class="lbl">Invoice No</label><input class="inp" style="font-weight:700" value="${s.invNo}" oninput="set({invNo:this.value})"/></div>
          <div><label class="lbl">Date</label><input class="inp" type="date" value="${s.invDate}" oninput="set({invDate:this.value})"/></div>
        </div>
        <div style="background:#f0f7ff;border-radius:10px;padding:11px 14px;margin-bottom:14px;border:1.5px solid #dbeafe">
          <div style="font-size:11px;font-weight:800;color:#1e40af;text-transform:uppercase;margin-bottom:4px">👨‍⚕️ Bill To</div>
          <div style="font-weight:800;color:#0d1b4b;font-size:15px">Dr. ${o.doctorName}</div>
          <div style="color:#555;font-size:13px">${o.clinicName?o.clinicName+" • ":""}${[o.area,o.city].filter(Boolean).join(", ")}${o.phone?" • 📞 "+o.phone:""}</div>
        </div>
        <div class="tw"><div class="th">💊 Items</div>
          <table><thead><tr>${["Product","Pack","MRP","Qty","Amount"].map((h,i)=>`<th style="text-align:${i>=2?"right":"left"}">${h}</th>`).join("")}</tr></thead>
          <tbody>${rows}</tbody></table>
        </div>
        <div style="background:#f0f7ff;border-radius:10px;padding:12px 16px;margin-bottom:16px;border:1.5px solid #bfdbfe">
          <div class="tr"><span style="color:#555">Subtotal</span><span style="font-weight:600">₹${sb.toFixed(2)}</span></div>
          <div class="tr" style="color:#1e40af"><span>GST (12%)</span><span style="font-weight:600">₹${gs.toFixed(2)}</span></div>
          <div class="tg"><span>GRAND TOTAL</span><span>₹${gr.toFixed(2)}</span></div>
        </div>
        <div style="display:flex;gap:12px">
          <button onclick="pi()" style="flex:1;background:#0d1b4b;color:#fff;border:2px solid #fcd34d;border-radius:10px;padding:13px;font-size:15px;font-weight:800;cursor:pointer">🖨️ Print / Save PDF</button>
          <button class="bs" onclick="set({inv:false})">Cancel</button>
        </div>
      </div>
    </div></div>`;
  }

  const nb=(v,ic,lb)=>`<button class="nb ${s.view===v?"on":""}" onclick="sv('${v}')">${ic} ${lb}</button>`;
  const liveClr=s.live?"#22c55e":"#f59e0b";
  const liveTxt=s.live?"● Live":"● Connecting...";

  document.getElementById("app").innerHTML=`
    <div class="hdr"><div class="hdr-in">
      <div class="logo-w"><img src="data:image/png;base64,${LOGO}" alt="Adhari"/>
        <div>
          <div class="co-n">Adhari Pharmaceuticals Pvt. Ltd.</div>
          <div class="co-s">📞 ${CO.ph} | ✉ ${CO.em}</div>
          <div class="co-s2">GSTIN: ${CO.gs} | Drug Lic: ${CO.dr}</div>
        </div>
      </div>
      <div class="nav">${nb("list","📋","Orders")}${nb("form","➕","New")}${nb("catalog","⚙️","Products")}</div>
    </div></div>
    <div class="tgl">✦ ${CO.tg} ✦ <span style="font-size:10px;font-weight:700;color:${liveClr};margin-left:8px">${liveTxt}</span></div>
    <div class="main">${html}</div>
    ${mod}
  `;
}

// ===== ACTIONS =====
function sv(v){S.view=v;if(v!=="form"){S.editId=null;S.form=bf();}render();}
function tp(name){const p=S.catalog.find(x=>x.name===name);if(!p)return;const i=S.form.products.findIndex(x=>x.name===name);if(i>=0)S.form.products.splice(i,1);else S.form.products.push({...p,qty:1,bonus:""});render();}
function rpo(name){S.form.products=S.form.products.filter(p=>p.name!==name);render();}
function up(name,field,val){const p=S.form.products.find(x=>x.name===name);if(p){p[field]=field==="qty"?(parseInt(val)||1):val;}render();}
function vd(id){S.detail=S.orders.find(o=>o._id===id)||null;S.view="detail";render();}
function se(id){const o=S.orders.find(x=>x._id===id);if(!o)return;S.form={...o,products:o.products.map(p=>({...p}))};S.editId=o._id;S.view="form";render();}

async function so(){
  const f=S.form;
  if(!f.doctorName||!f.phone||f.products.length===0)return;
  const data={...f,date:new Date().toLocaleDateString("en-IN"),createdAt:Date.now()};
  try{
    if(S.editId){
      const ex=S.orders.find(x=>x._id===S.editId);
      if(ex){data.orderNo=ex.orderNo;data.date=ex.date;data.createdAt=ex.createdAt;}
      await db.collection("orders").doc(S.editId).update(data);
    } else {
      data.orderNo="ADH-"+String(Date.now()).slice(-6);
      await db.collection("orders").add(data);
    }
    toast("☁️ Order Saved!");
    S.form=bf();S.pSearch="";S.pCat="All";S.editId=null;S.view="list";render();
  }catch(e){toast("❌ Error: "+e.message);}
}

async function do2(id){
  if(!confirm("Delete this order?"))return;
  try{await db.collection("orders").doc(id).delete();toast("🗑️ Deleted");S.view="list";render();}
  catch(e){toast("❌ Error: "+e.message);}
}

async function ap(){
  const n=S.newP.name.trim();
  if(!n)return;
  if(S.catalog.some(p=>p.name.toLowerCase()===n.toLowerCase())){S.catErr="Already exists!";render();return;}
  try{await db.collection("catalog").add({...S.newP,name:n});toast("💊 Product Added!");S.newP={name:"",pack:"",mrp:"",cat:"General"};S.catErr="";render();}
  catch(e){toast("❌ Error: "+e.message);}
}

async function rp(id,name){
  if(!confirm("Remove "+name+"?"))return;
  try{await db.collection("catalog").doc(id).delete();toast("🗑️ Removed");render();}
  catch(e){toast("❌ Error: "+e.message);}
}

function oi(id){const o=S.orders.find(x=>x._id===id);if(!o)return;S.invOrd={...o,products:o.products.map(p=>({...p}))};S.invNo="INV-"+String(Date.now()).slice(-6);S.invDate=td();S.inv=true;render();}
function uip(name,field,val){if(!S.invOrd)return;const p=S.invOrd.products.find(x=>x.name===name);if(p){p[field]=field==="qty"?(parseInt(val)||1):val;}render();}
function po(id){const o=S.orders.find(x=>x._id===id);if(o)pp(oHTML(o));}
function pi(){if(S.invOrd)pp(iHTML(S.invOrd,S.invNo,S.invDate));}

// ===== BOOT =====
async function boot(){
  try {
    // Test connection
    const testSnap = await db.collection("catalog").limit(1).get();
    
    // Seed catalog if empty
    if(testSnap.empty){
      document.getElementById("ld-msg").textContent = "Setting up for first time...";
      for(const p of PRODS){
        await db.collection("catalog").add(p);
      }
    }

    // Live listeners
    db.collection("orders").orderBy("createdAt","desc").onSnapshot(snap=>{
      S.orders=snap.docs.map(d=>({...d.data(),_id:d.id}));
      S.live=true;
      document.getElementById("ld").style.display="none";
      document.getElementById("app").style.display="block";
      render();
    },err=>{
      document.getElementById("ld-msg").textContent="Error: "+err.message;
    });

    db.collection("catalog").onSnapshot(snap=>{
      S.catalog=snap.docs.map(d=>({...d.data(),_id:d.id}));
      render();
    });

  } catch(e) {
    document.getElementById("ld-msg").textContent = "Failed: "+e.message;
    document.getElementById("ld").innerHTML += `<button onclick="location.reload()" style="margin-top:20px;background:#fff;color:#0d1b4b;border:none;border-radius:10px;padding:12px 28px;font-size:15px;font-weight:800;cursor:pointer">🔄 Retry</button>`;
  }
}

boot();
</script>
</body>
</html>
